# Do not manually hard-code research pages in the personal site Markdown.
# Update this source file first, then run the site's sync and generation scripts.
#
# This is a compact front-end display index. Full notes and CSV datasets remain
# in the surrounding research-links topic, paper, codebase, and roadmap files.
schema_version: 1
source:
