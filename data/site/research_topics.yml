  expected_path: data/site/research_topics.yml
  local_path: ../research-links/data/site/research_topics.yml
  policy: "This site keeps a compact display index only; full CSV tables remain in research-links."

topics:
  - slug: eob
    order: 10
    title: "有效单体理论（Effective-One-Body, EOB）"
    short_title: "EOB"
    status: active
    summary: "从两体动力学的有效哈密顿量出发，把 PN/PM、重求和波形、NR 校准、GSF 约束和 IMR 波形模型组织成一条可复现的研究链。"
    relation_to_my_work: "当前重点是理解 pySEOBNR/SEOBNRv5 的哈密顿量、辐射通量和校准参数如何耦合，并评估替换或诊断部分动力学模块的可行性。"
    ai_status: "B：中心性高，代码相关性强；仍需逐条人工校验元数据、公式和实现位置。"
    human_status: "部分校验：pySEOBNR 使用路径已熟悉，文献注释仍在补全。"
    data_links:
      - label: "EOB 代表论文 CSV"
        url: "https://github.com/recruitL/research-links/blob/main/data/papers/eob_selected.csv"
      - label: "EOB 时间线 CSV"
        url: "https://github.com/recruitL/research-links/blob/main/data/papers/eob_timeline.csv"
      - label: "EOB 代码库 CSV"
        url: "https://github.com/recruitL/research-links/blob/main/data/codebases/eob_codebases.csv"
    topic_links:
      - label: "research-links/EOB 总览"
        url: "https://github.com/recruitL/research-links/tree/main/topics/eob"
      - label: "EOB roadmap"
        url: "https://github.com/recruitL/research-links/blob/main/roadmaps/eob-from-origin-to-current.md"
    tags: [EOB, PN, PM, NR, GSF, waveform, IMR]
    pipeline:
      - "有效哈密顿量：把真实两体问题映射到有效一体问题。"
      - "重求和波形：factorized/resummed multipolar waveform 与通量结构。"
      - "NR 校准：用数值相对论修正自由参数、merger-ringdown 和模型误差。"
      - "GSF/规范不变量：用小质量比极限约束 EOB potentials 和 flux。"
      - "代码实现：pySEOBNR、LALSimulation、TEOBResumS 与验证数据。"
    timeline:
      - year: 1998
        title: "EOB 初始形式"
        detail: "Buonanno-Damour 建立 EOB 映射和有效哈密顿量，是后续 EOB waveform 的起点。"
      - year: 2000
        title: "Inspiral-plunge 过渡"
        detail: "EOB 被用于连接准圆 inspiral 与 plunge，为完整 coalescence 建模提供动力学框架。"
      - year: 2008
        title: "Factorized/resummed 波形"
        detail: "多极波形的重求和结构成为现代 EOB 波形构造的核心技术。"
      - year: 2009
        title: "NR 校准阶段"
        detail: "EOBNR 与数值相对论波形比较和校准，推动模型进入高精度 IMR 建模。"
      - year: 2012
        title: "GSF 约束 EOB potentials"
        detail: "GSF 信息开始系统进入 EOB potentials 与规范不变量比较。"
      - year: 2016
        title: "SEOBNRv4"
        detail: "面向探测器时代的非进动自旋模型，是 LVK 波形族的重要节点。"
      - year: 2023
        title: "SEOBNRv5"
        detail: "更高效率和精度的现代 SEOBNR 基础，与 pySEOBNR 直接相关。"
    categories:
      - name: "EOB foundation / Hamiltonian / PN-PM"
        description: "有效哈密顿量、PN/PM 信息吸收、坐标/规范选择和保守动力学。"
      - name: "resummation / flux / factorized waveform"
        description: "多极波形因子化、rho_lm、tail factor、通量重求和和环绕轨道极限。"
      - name: "NR calibration / EOBNR / SEOBNR / TEOBResumS"
        description: "将自由参数、merger-ringdown 拼接和误差控制与 NR 波形对齐。"
      - name: "GSF / gauge-invariant comparison / EOB potentials"
        description: "用红移、ISCO shift、binding energy、flux 等规范不变量约束小质量比极限。"
      - name: "generic orbit / EMRI / EOB-Teukolsky"
        description: "偏心、散射、任意轨道和 Teukolsky/BHPT flux 与 EOB 的桥接。"
    selected_papers:
      - title: "Effective one-body approach to general relativistic two-body dynamics"
        authors: "A. Buonanno; T. Damour"
        year: 1998
        arxiv: "gr-qc/9811091"
        role: "EOB 映射和有效哈密顿量的奠基文献。"
        status: "selected; needs human annotation"
        ai_rating: A
      - title: "Improved resummation of post-Newtonian multipolar waveforms from circularized compact binaries"
        authors: "T. Damour; A. Nagar; M. Trias"
        year: 2008
        arxiv: "0811.2069"
        role: "factorized/resummed multipolar waveform 的关键来源。"
        status: "selected; needs human annotation"
        ai_rating: A
      - title: "Gravitational self-force and the effective-one-body formalism between the innermost stable circular orbit and the light ring"
        authors: "A. Akcay et al."
        year: 2012
        arxiv: "1209.0964"
        role: "GSF 信息约束 EOB potentials 的代表节点。"
        status: "selected; needs human annotation"
        ai_rating: A
      - title: "Laying the foundation of the effective-one-body waveform models SEOBNRv5"
        authors: "G. Pompili et al."
        year: 2023
        arxiv: "2303.18039"
        role: "现代 SEOBNRv5/pySEOBNR 路线的核心入口。"
        status: "selected; needs human annotation"
        ai_rating: A
    codebases:
      - name: "pySEOBNR"
        url: "https://git.ligo.org/waveforms/software/pyseobnr"
        role: "SEOBNRv5 波形生成与诊断，是当前代码阅读和实验的主入口。"
        status: "active; local familiarity high"
      - name: "LALSuite / LALSimulation"
        url: "https://git.ligo.org/lscsoft/lalsuite"
        role: "LVK 生产级波形实现和交叉验证基准。"
        status: "active; high engineering overhead"
      - name: "TEOBResumS"
        url: "https://bitbucket.org/eob_ihes/teobresums"
        role: "另一条 resummed EOB 波形族，适合比较 resummation 和 tides/generic orbit 选择。"
        status: "needs current repository verification"
    next_steps:
      - "把 pySEOBNR 中 Hamiltonian、flux、waveform mode、calibration 参数的调用链整理成代码库笔记。"
      - "为每篇 selected paper 补一页中文 paper note，区分 AI 初评和人工校验。"
      - "建立 EOB-GSF 规范不变量比较表，标出哪些量可用于当前工作验证。"

